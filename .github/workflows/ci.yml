name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (Lint + Typecheck + Test + Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc)
        run: bun x tsc --noEmit

      - name: Run tests (vitest)
        run: bun x vitest run

      - name: Build (vite + PWA)
        run: bun x vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    name: E2E Tests (Playwright)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright
        run: bun x playwright install --with-deps chromium

      - name: Build
        run: bun x vite build

      - name: Run E2E tests
        run: bun x playwright test --project=chromium

  deploy-preview:
    name: Deploy Preview (Vercel)
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel Preview
        run: vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-production:
    name: Deploy Production (Vercel)
    needs: [validate, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Smoke test post-deploy: la app debe responder y ser Declarix.
      # Si falla, el workflow queda en rojo → revisar/revertir de inmediato.
      - name: Post-deploy smoke test
        run: |
          sleep 20
          for i in 1 2 3; do
            BODY=$(curl -fsSL --max-time 15 https://declarix.vercel.app/login) && break
            echo "Intento $i falló, reintentando en 10s..." && sleep 10
          done
          echo "$BODY" | grep -qi "Declarix" || { echo "El HTML no contiene 'Declarix'"; exit 1; }
          echo "Smoke test OK"